# fly.toml app configuration file generated for cheapcoffeeapp on 2026-03-12T15:12:35+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cheapcoffeeapp'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  cpu_kind = 'shared'

[[mounts]]
  source = 'data'
  destination = '/data'
